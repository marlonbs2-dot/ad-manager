services:
  # Database Service (MariaDB)
  db:
    image: mariadb:10.11
    container_name: ad-manager-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password}
      MYSQL_DATABASE: ${DB_DATABASE:-ad_manager}
      MYSQL_USER: ${DB_USERNAME:-ad_manager}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ad_secure_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Application Service (PHP-FPM + Nginx + Supervisor)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ad-manager-app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ad_manager}
      - DB_USERNAME=${DB_USERNAME:-ad_manager}
      - DB_PASSWORD=${DB_PASSWORD:-ad_secure_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db_data:


networks:
  app-network:
    driver: bridge
